services:

  api:
    build:
      context: ./backend
    container_name: descarga-sat-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      DATABASE_URL: postgresql://sat:sat@db:5432/descarga_sat
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: descarga-sat-db

    environment:
      POSTGRES_DB: descarga_sat
      POSTGRES_USER: sat
      POSTGRES_PASSWORD: sat

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
